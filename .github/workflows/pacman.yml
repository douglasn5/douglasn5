name: generate arcade contribution graphs

on:
  schedule: # roda automaticamente a cada 24h
    - cron: '0 0 * * *'
  workflow_dispatch: # permite rodar manualmente pela aba Actions
  push: # roda a cada push na branch main
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: generate contribution graph SVGs
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: 'pacman'

      # Publica os SVGs gerados na branch "output"
      - name: push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
